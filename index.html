<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>감초식당 신제주점</title>

<style>
body {
  font-family: 'Arial', sans-serif;
  margin: 0;
  background-color: #f7f3ee;
  color: #333;
}

/* 배너 */
.banner {
  position: relative;
  width: 100%;
  height: 240px;
  overflow: hidden;
}

.banner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.banner::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
  top: 0;
  left: 0;
}

.banner-text {
  position: absolute;
  bottom: 20px;
  left: 20px;
  color: white;
  z-index: 1;
}

.container {
  padding: 15px;
}

h2 {
  margin-top: 30px;
  color: #6b3f2b;
  border-left: 5px solid #c8a27a;
  padding-left: 8px;
}

.menu-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.menu-card {
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.menu-info {
  padding: 10px;
}

.menu-info h3 {
  margin: 0;
  font-size: 14px;
}

.price {
  color: #a0522d;
  font-weight: bold;
  font-size: 13px;
}

/* 🔥 이미지 영역 */
.img-wrap {
  position: relative;
}

.menu-card img {
  width: 100%;
  height: 120px; /* 🔥 적당한 크기 */
  object-fit: cover;
}

/* 🔥 뱃지 (이미지 위로 이동) */
.badge {
  position: absolute;
  top: 8px;
  left: 8px;
  background: #a0522d;
  color: white;
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 5px;
}

@media (max-width: 600px) {
  .menu-grid {
    grid-template-columns: 1fr 1fr;
  }
}

.btn {
  display: inline-block;
  padding: 12px;
  background: #6b3f2b;
  color: white;
  text-decoration: none;
  border-radius: 8px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="banner">
  <img src="banner.jpeg">
  <div class="banner-text">
    <h1>감초식당 신제주점</h1>
    <p>1994년부터 30년간 이어진 변함없는 어머님의 그 맛</p>
  </div>
</div>

<div class="container">

<h2>🍲 식사 메뉴</h2>
<div class="menu-grid">

<div class="menu-card">
  <div class="img-wrap">
    <img src="menu1.jpeg">
    <div class="badge">BEST</div>
  </div>
  <div class="menu-info">
    <h3>감초순대국밥</h3>
    <p style="font-size:12px;">30년 전통 대표 메뉴</p>
    <p class="price">9,000원</p>
  </div>
</div>

<div class="menu-card">
  <div class="img-wrap">
    <img src="menu2.jpg">
  </div>
  <div class="menu-info">
    <h3>감초돼지해장국</h3>
    <p style="font-size:12px;">마늘 듬뿍 칼칼한 해장국</p>
    <p class="price">10,000원</p>
  </div>
</div>

<div class="menu-card">
  <div class="img-wrap">
    <img src="menu3.jpg">
  </div>
  <div class="menu-info">
    <h3>순수돼지국밥</h3>
    <p style="font-size:12px;">담백한 프리미엄 국밥</p>
    <p class="price">9,000원</p>
  </div>
</div>

</div>

<h2>📞 전화</h2>
<a class="btn" href="tel:0647438988">전화 바로걸기</a>

<h2>📍 오시는 길</h2>
<p style="font-size:13px; color:gray;">
제주시 노연로 144 / 주차 가능
</p>

width="100%" height="350"
style="border-radius:10px; border:0;">
</iframe>

</div>

</body>
</html>
