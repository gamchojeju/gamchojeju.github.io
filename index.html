<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>감초식당 신제주점</title>

<style>
body{font-family:'Pretendard',Arial;margin:0;background:#f7f3ee;}
.banner{position:relative;height:320px;overflow:hidden;}
.banner img{width:100%;height:100%;object-fit:cover;}
.banner::after{content:"";position:absolute;width:100%;height:100%;background:linear-gradient(to top,rgba(0,0,0,0.6),rgba(0,0,0,0.2));}
.banner-text{position:absolute;bottom:20px;left:20px;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,0.6);} 

.container{padding:18px;}

h2{margin-top:40px;font-size:20px;color:#6b3f2b;border-left:6px solid #c8a27a;padding-left:10px;}

.lang-buttons{display:flex;justify-content:center;gap:8px;margin:15px 0;}
.lang-buttons button{padding:8px 12px;background:#6b3f2b;color:#fff;border:none;border-radius:20px;cursor:pointer;}
.lang-buttons button.active{background:#c8a27a;}

.menu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;}
.menu-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 6px 14px rgba(0,0,0,0.08);cursor:pointer;position:relative;}
.menu-card img{width:100%;aspect-ratio:1/1;object-fit:contain;background:#fafafa;padding:10px;}
.menu-info{padding:10px;}
.price{color:#a0522d;font-weight:bold;}
.badge{position:absolute;top:8px;left:8px;background:#ff5a5a;color:#fff;padding:3px 6px;font-size:11px;border-radius:6px;}

.modal{display:none;position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:999;}
.modal-content{text-align:center;margin-top:5%;}
.modal img{max-width:90%;max-height:75%;border-radius:12px;}
.modal p{color:#fff;margin-top:10px;}

</style>
</head>
<body>

<div class="banner">
<img src="banner.jpg">
<div class="banner-text">
<h1 id="title">감초식당 신제주점</h1>
<p id="subtitle">30년 전통의 맛</p>
</div>
</div>

<div class="container">

<div class="lang-buttons">
<button onclick="setLang('ko')">KO</button>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('zh')">ZH</button>
<button onclick="setLang('ja')">JA</button>
</div>

<div id="menuArea"></div>

</div>

<div id="modal" class="modal">
<div class="modal-content">
<img id="modalImg">
<p id="modalText"></p>
</div>
</div>

<script>
let currentLang="ko";

const menuData=[
// 식사
{cat:"meal",img:"menu1.jpg",best:true,name:{ko:"감초순대국밥",en:"Sundae Gukbap",zh:"米肠汤饭",ja:"スンデクッパ"},desc:{ko:"30년 전통",en:"30 years",zh:"30年",ja:"30年"},price:"9,000원"},
{cat:"meal",img:"menu2.png",name:{ko:"감초돼지해장국",en:"Pork Soup",zh:"猪肉汤",ja:"豚スープ"},desc:{ko:"마늘 듬뿍",en:"Garlic",zh:"蒜",ja:"ニンニク"},price:"10,000원"},
{cat:"meal",img:"menu3.png",name:{ko:"순수돼지국밥",en:"Pure Pork",zh:"猪肉",ja:"豚"},desc:{ko:"담백",en:"Light",zh:"清淡",ja:"あっさり"},price:"9,000원"},
{cat:"meal",img:"menu4.png",name:{ko:"마농돼지우동",en:"Udon",zh:"乌冬",ja:"うどん"},desc:{ko:"마늘향",en:"Garlic",zh:"蒜",ja:"ニンニク"},price:"9,000원"},
{cat:"meal",img:"menu6.png",name:{ko:"맛보기순대",en:"Sundae",zh:"米肠",ja:"スンデ"},desc:{ko:"수제",en:"Homemade",zh:"手工",ja:"手作り"},price:"10,000원"},
{cat:"meal",img:"menu5.png",name:{ko:"검은콩국수",en:"Noodles",zh:"面",ja:"麺"},desc:{ko:"여름",en:"Summer",zh:"夏",ja:"夏"},price:"9,000원"},

// 전골
{cat:"hotpot",img:"menu10.jpg",best:true,name:{ko:"순대내장전골",en:"Hotpot",zh:"火锅",ja:"鍋"},desc:{ko:"푸짐",en:"Rich",zh:"丰富",ja:"豊富"},price:"35,000원"},
{cat:"hotpot",img:"menu11.jpg",name:{ko:"내장막창전골",en:"Hotpot",zh:"火锅",ja:"鍋"},desc:{ko:"내장",en:"Offal",zh:"内脏",ja:"内臓"},price:"35,000원"},
{cat:"hotpot",img:"menu12.jpg",name:{ko:"닭볶음탕",en:"Chicken",zh:"鸡",ja:"鶏"},desc:{ko:"준비중",en:"Soon",zh:"准备",ja:"準備"},price:"35,000원"},
{cat:"hotpot",img:"menu13.png",name:{ko:"돼지해장전골",en:"Pork",zh:"猪",ja:"豚"},desc:{ko:"라면 포함",en:"Ramen",zh:"拉面",ja:"ラーメン"},price:"22,000원"},
{cat:"hotpot",img:"menu14.png",name:{ko:"순대술국",en:"Soup",zh:"汤",ja:"スープ"},desc:{ko:"술안주",en:"With drink",zh:"下酒",ja:"お酒"},price:"20,000원"},

// 세트
{cat:"set",img:"menu7.jpg",name:{ko:"A세트",en:"Set A",zh:"A套餐",ja:"Aセット"},desc:{ko:"순대+머리고기",en:"A",zh:"A",ja:"A"},price:"15,000원"},
{cat:"set",img:"menu8.jpg",name:{ko:"B세트",en:"Set B",zh:"B套餐",ja:"Bセット"},desc:{ko:"순대+내장",en:"B",zh:"B",ja:"B"},price:"20,000원"},
{cat:"set",img:"menu9.jpg",name:{ko:"C세트",en:"Set C",zh:"C套餐",ja:"Cセット"},desc:{ko:"풀세트",en:"C",zh:"C",ja:"C"},price:"25,000원"}
];

const categoryNames={
meal:"🍲 식사 메뉴",
hotpot:"🍖 전골 / 요리",
set:"🍢 세트 메뉴"
};

function renderMenu(){
 const area=document.getElementById("menuArea");
 area.innerHTML="";

 Object.keys(categoryNames).forEach(cat=>{
  area.innerHTML+=`<h2>${categoryNames[cat]}</h2><div class="menu-grid" id="${cat}"></div>`;

  menuData.filter(m=>m.cat===cat).forEach(item=>{
   document.getElementById(cat).innerHTML+=`
   <div class="menu-card" onclick="openModal('${item.img}','${item.name[currentLang]}')">
     ${item.best?'<div class="badge">BEST</div>':''}
     <img src="${item.img}">
     <div class="menu-info">
       <h3>${item.name[currentLang]}</h3>
       <p>${item.desc[currentLang]}</p>
       <p class="price">${item.price}</p>
     </div>
   </div>`;
  });
 });
}

function setLang(lang){
 currentLang=lang;
 document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
 event.target.classList.add("active");
 renderMenu();
}

function openModal(img,text){
 document.getElementById("modal").style.display="block";
 document.getElementById("modalImg").src=img;
 document.getElementById("modalText").innerText=text;
}

document.getElementById("modal").onclick=function(e){if(e.target===this)this.style.display="none"};

document.addEventListener("keydown",e=>{if(e.key==='Escape')document.getElementById("modal").style.display="none"});

renderMenu();
</script>

</body>
</html>
