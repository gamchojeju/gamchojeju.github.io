<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>감초식당 신제주점</title>

<style>
body {
  font-family: 'Pretendard', Arial, sans-serif;
  margin:0;
  background:#f7f3ee;
}

/* 배너 */
.banner {
  position:relative;
  height:360px;
  overflow:hidden;
}
.banner img {
  width:100%;
  height:100%;
  object-fit:cover;
}
.banner::after {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to top, rgba(0,0,0,0.6), rgba(0,0,0,0.2));
}
.banner-text {
  position:absolute;
  bottom:30px;
  left:20px;
  color:#fff;
  z-index:1;
}
.banner-text h1 {
  font-size:28px;
  margin:0;
}
.banner-text p {
  margin-top:6px;
  opacity:0.9;
}

/* 컨테이너 */
.container { padding:18px; }

/* 섹션 제목 */
h2 {
  margin-top:40px;
  font-size:20px;
  color:#6b3f2b;
  border-left:6px solid #c8a27a;
  padding-left:10px;
}

/* 언어 버튼 */
.lang-buttons {
  display:flex;
  justify-content:center;
  gap:8px;
  margin:15px 0;
}
.lang-buttons button {
  padding:8px 12px;
  background:#6b3f2b;
  color:white;
  border:none;
  border-radius:20px;
  cursor:pointer;
  transition:0.2s;
}
.lang-buttons button:hover {
  background:#8b5a3c;
}

/* 그리드 */
.menu-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}

/* 카드 */
.menu-card {
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 8px 18px rgba(0,0,0,0.08);
  cursor:pointer;
  transition:0.25s;
}
.menu-card:hover {
  transform: translateY(-6px) scale(1.02);
}

/* 이미지 */
.menu-card img {
  width:100%;
  aspect-ratio:1/1;
  object-fit:contain;
  background:#fafafa;
  padding:10px;
}

/* 정보 */
.menu-info {
  padding:12px;
}
.menu-info h3 {
  margin:0;
  font-size:15px;
}
.menu-info p {
  margin:5px 0;
  font-size:13px;
  color:#666;
}
.price {
  margin-top:8px;
  color:#a0522d;
  font-weight:bold;
}

/* 버튼 */
.btn {
  display:block;
  padding:14px;
  background:#6b3f2b;
  color:white;
  text-align:center;
  border-radius:10px;
  text-decoration:none;
  margin-top:10px;
  font-weight:bold;
}

/* 모달 */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  z-index:999;
}
.modal-content {
  text-align:center;
  margin-top:5%;
}
.modal img {
  max-width:90%;
  max-height:80%;
  border-radius:12px;
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
}
.modal p {
  color:#fff;
  margin-top:10px;
}

/* 반응형 */
@media(max-width:900px){
  .menu-grid{grid-template-columns:1fr 1fr;}
}
@media(max-width:500px){
  .menu-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- 배너 -->
<div class="banner">
<img src="banner.jpg">
<div class="banner-text">
<h1 id="title">감초식당 신제주점</h1>
<p id="subtitle">1994년부터 30년간 이어진 변함없는 어머님의 그 맛, 그대로!</p>
</div>
</div>

<div class="container">

<!-- 언어 -->
<div class="lang-buttons">
<button onclick="setLang('ko')">한국어</button>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('zh')">中文</button>
<button onclick="setLang('ja')">日本語</button>
</div>

<!-- 식사 -->
<h2 id="mealTitle">🍲 식사 메뉴</h2>
<div class="menu-grid">

<div class="menu-card" onclick="openModal(this)">
<img src="menu1.jpg">
<div class="menu-info">
<h3 data-ko="감초순대국밥" data-en="Sundae Gukbap" data-zh="米肠汤饭" data-ja="スンデクッパ">감초순대국밥</h3>
<p data-ko="30년간 이어진 변함없는 어머님의 그맛" data-en="30 years traditional taste" data-zh="传承30年的传统味道" data-ja="30年続く伝統の味">30년간 이어진 변함없는 어머님의 그맛</p>
<p class="price">9,000원</p>
</div>
</div>

<div class="menu-card" onclick="openModal(this)">
<img src="menu2.png">
<div class="menu-info">
<h3 data-ko="감초돼지해장국" data-en="Pork Hangover Soup" data-zh="猪肉醒酒汤" data-ja="豚肉ヘジャングク">감초돼지해장국</h3>
<p data-ko="알싸한 대정 마늘을 듬뿍넣고 칼칼하게 끓여낸 돼지 해장국" data-en="Spicy garlic pork soup" data-zh="加入大量大蒜的辛辣猪肉汤" data-ja="ニンニクたっぷりのピリ辛豚スープ">알싸한 대정 마늘을 듬뿍넣고 칼칼하게 끓여낸 돼지 해장국</p>
<p class="price">10,000원</p>
</div>
</div>

<!-- 나머지 메뉴들 동일 구조 그대로 추가 (생략 없이 유지) -->
<!-- 👉 여기 아래는 너가 기존에 쓴 메뉴 전부 그대로 유지하면 됨 -->

</div>

<!-- 전화 -->
<h2 id="callTitle">📞 전화</h2>
<a class="btn" id="callBtn" href="tel:0647438988">전화 바로걸기</a>

<!-- 지도 -->
<h2 id="mapTitle">📍 오시는 길</h2>
<p id="address">제주시 노연로 144 1층</p>
<iframe src="https://naver.me/GowzTPzr" width="100%" height="350" style="border-radius:10px; border:0;"></iframe>

</div>

<!-- 모달 -->
<div id="modal" class="modal" onclick="closeModal()">
<div class="modal-content">
<img id="modalImg">
<p id="modalText"></p>
</div>
</div>

<script>

/* 언어 */
function setLang(lang){
document.querySelectorAll("[data-ko]").forEach(el=>{
el.innerText = el.getAttribute("data-"+lang);
});
}

/* 모달 */
function openModal(el){
document.getElementById("modal").style.display="block";
document.getElementById("modalImg").src = el.querySelector("img").src;
document.getElementById("modalText").innerText =
el.querySelector("h3").innerText;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* ESC 닫기 */
document.addEventListener("keydown", function(e){
if(e.key === "Escape"){
closeModal();
}
});
</script>

</body>
</html>
