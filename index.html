<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>감초식당 신제주점</title>

<style>
body { font-family: Arial; margin:0; background:#f7f3ee; }

/* 배너 */
.banner { position:relative; height:340px; overflow:hidden;}
.banner img { width:100%; height:100%; object-fit:cover;}
.banner::after {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.3);
}
.banner-text {
  position:absolute;
  bottom:20px;
  left:20px;
  color:#fff;
  text-shadow:0 2px 8px rgba(0,0,0,0.6);
  z-index:1;
}

/* 컨테이너 */
.container { padding:15px;}

h2 {
  margin-top:30px;
  color:#6b3f2b;
  border-left:5px solid #c8a27a;
  padding-left:8px;
}

/* 메뉴 그리드 */
.menu-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

/* 카드 */
.menu-card {
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 6px 14px rgba(0,0,0,0.08);
  cursor:pointer;
  transition:0.2s;
}

.menu-card:hover {
  transform: translateY(-6px) scale(1.02);
}

/* 이미지 */
.menu-card img {
  width:100%;
  aspect-ratio:1/1;
  object-fit:contain;
  background:#f8f8f8;
  padding:8px;
}

/* 텍스트 */
.menu-info { padding:10px;}
.price { color:#a0522d; font-weight:bold;}

/* 언어 버튼 */
.lang-buttons { text-align:center; margin:10px;}
.lang-buttons button {
  margin:3px;
  padding:6px 10px;
  background:#6b3f2b;
  color:white;
  border:none;
  border-radius:5px;
  transition:0.2s;
}
.lang-buttons button:hover {
  background:#8b5a3c;
}

/* 버튼 */
.btn {
  display:block;
  padding:12px;
  background:#6b3f2b;
  color:white;
  text-align:center;
  border-radius:8px;
  text-decoration:none;
  margin-top:10px;
}

/* 모달 */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
}

.modal img {
  max-width:90%;
  max-height:90%;
  display:block;
  margin:5% auto;
  border-radius:10px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* 반응형 */
@media(max-width:900px){
  .menu-grid{grid-template-columns:1fr 1fr;}
}
@media(max-width:500px){
  .menu-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- 배너 -->
<div class="banner">
<img src="banner.jpg">
<div class="banner-text">
<h1 id="title">감초식당 신제주점</h1>
<p id="subtitle" style="font-size:14px;">
1994년부터 30년간 이어진 변함없는 어머님의 그 맛, 그대로!
</p>
</div>
</div>

<div class="container">

<!-- 언어 -->
<div class="lang-buttons">
<button onclick="setLang('ko')">한국어</button>
<button onclick="setLang('en')">ENGLISH</button>
<button onclick="setLang('zh')">中文</button>
<button onclick="setLang('ja')">日本語</button>
</div>

<h2 id="mealTitle">🍲 식사 메뉴</h2>

<div class="menu-grid">

<!-- 메뉴 1 -->
<div class="menu-card" onclick="openModal(this)">
<img src="menu1.jpg">
<div class="menu-info">
<h3 data-ko="감초순대국밥" data-en="Sundae Gukbap" data-zh="米肠汤饭" data-ja="スンデクッパ">감초순대국밥</h3>
<p data-ko="30년 전통의 깊은 맛" data-en="30 years tradition" data-zh="30年传统味道" data-ja="30年の伝統の味">30년 전통의 깊은 맛</p>
<p class="price">9,000원</p>
</div>
</div>

<!-- 메뉴 2 -->
<div class="menu-card" onclick="openModal(this)">
<img src="menu2.png">
<div class="menu-info">
<h3 data-ko="감초돼지해장국" data-en="Pork Hangover Soup" data-zh="猪肉醒酒汤" data-ja="豚肉ヘジャングク">감초돼지해장국</h3>
<p data-ko="마늘 듬뿍 얼큰한 국물" data-en="Spicy garlic pork soup" data-zh="蒜香猪肉汤" data-ja="ニンニクたっぷりスープ">마늘 듬뿍 얼큰한 국물</p>
<p class="price">10,000원</p>
</div>
</div>

</div>

<!-- 전화 -->
<h2 id="callTitle">📞 전화</h2>
<a class="btn" id="callBtn" href="tel:0647438988">전화 바로걸기</a>

</div>

<!-- 모달 -->
<div id="modal" class="modal" onclick="closeModal()">
<img id="modalImg">
</div>

<script>

/* 언어 변경 */
function setLang(lang){
document.querySelectorAll("[data-ko]").forEach(el=>{
el.innerText = el.getAttribute("data-"+lang);
});

const text = {
ko:["감초식당 신제주점","30년 전통의 맛","🍲 식사 메뉴","📞 전화","전화 바로걸기"],
en:["Gamcho Restaurant","30 years tradition","🍲 Menu","📞 Call","Call Now"],
zh:["甘草餐厅","30年传统","🍲 菜单","📞 电话","拨打电话"],
ja:["カムチョ食堂","30年の伝統","🍲 メニュー","📞 電話","電話する"]
};

document.getElementById("title").innerText = text[lang][0];
document.getElementById("subtitle").innerText = text[lang][1];
document.getElementById("mealTitle").innerText = text[lang][2];
document.getElementById("callTitle").innerText = text[lang][3];
document.getElementById("callBtn").innerText = text[lang][4];
}

/* 모달 */
function openModal(el){
document.getElementById("modal").style.display="block";
document.getElementById("modalImg").src = el.querySelector("img").src;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* ESC 닫기 */
document.addEventListener("keydown", function(e){
if(e.key === "Escape"){
closeModal();
}
});

</script>

</body>
</html>
